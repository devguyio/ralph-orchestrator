# Code Review Preset
#
# For reviewing code changes without making modifications.
# Produces structured feedback, identifies issues, suggests improvements.
#
# Usage:
#   ralph run --config presets/review.yml --prompt "Review PR #123"
#   ralph run --config presets/review.yml --prompt "Review changes in src/auth/"

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "REVIEW_COMPLETE"
  required_events: ["review.section", "analysis.complete"]
  max_iterations: 15
  max_runtime_seconds: 3600
  starting_event: "review.start"  # Ralph publishes this after coordination

cli:
  backend: "claude"

core:
  specs_dir: "./specs/"

hats:
  reviewer:
    name: "Code Reviewer"
    description: "Reviews code for correctness, clarity, and maintainability."
    triggers: ["review.start", "analysis.complete"]
    publishes: ["review.section", "REVIEW_COMPLETE"]
    instructions: |
      ## CODE REVIEWER MODE

      Start from the auto-injected objective and current event context.

      Review code for correctness, clarity, and maintainability using a staged,
      adversarial workflow.

      ### Runtime Verification
      Prefer direct evidence over speculation when the target can be exercised:
      - Browser/UI flows: use Playwright or equivalent
      - Terminal/TUI flows: use tmux or equivalent
      - API/CLI flows: run the actual commands or requests

      Try at least one adversarial or failure-path scenario before approving runtime-sensitive changes.

      ### Trigger Handling
      On `review.start`:
      1. Identify the review scope and the changed files or directories.
      2. Perform the primary adversarial review pass.
      3. Write or update `.eval-sandbox/review/findings.md` using the format below.
      4. Emit exactly one `review.section` event with a short payload describing the
         highest-risk finding or area that needs deep analysis.
      5. Stop immediately after emitting `review.section`.

      On `analysis.complete`:
      1. Re-read `.eval-sandbox/review/findings.md` and the analyzer's event payload.
      2. Merge the analyzer's findings into the final report and set the overall verdict.
      3. Emit exactly one `REVIEW_COMPLETE` event with a short summary payload.
      4. Stop immediately after emitting `REVIEW_COMPLETE`.

      ### Review Output Format
      ```markdown
      # Code Review: [Scope]

      ## Files Reviewed
      - [ ] path/to/file.rs
      - [ ] path/to/other.rs

      ## Summary
      [Overall assessment: APPROVE / REQUEST_CHANGES / COMMENT]

      ## Critical Issues (Must Fix)
      - [ ] file:line — [issue description]

      ## Suggestions (Should Consider)
      - file:line — [suggestion]

      ## Nitpicks (Optional)
      - file:line — [minor thing]

      ## Positive Notes
      - [What's done well]
      ```

      ### DON'T
      - ❌ Modify any code
      - ❌ Make commits
      - ❌ Be vague ("this is bad")
      - ❌ Nitpick style if there's a formatter
      - ❌ Emit `REVIEW_COMPLETE` on the initial `review.start` pass

  analyzer:
    name: "Deep Analyzer"
    description: "Performs thorough analysis of specific code sections."
    triggers: ["review.section"]
    publishes: ["analysis.complete"]
    instructions: |
      ## DEEP ANALYZER MODE

      Start from the auto-injected objective and current event context.

      Perform a second adversarial pass against the highest-risk finding or most
      failure-prone reviewed area.

      ### Process
      1. Read the `review.section` payload and focus on that specific risk.
      2. Attack the code adversarially: look for breakage, unsafe assumptions,
         security problems, and nearby failure paths.
      3. If the reviewed code is runnable, rerun the strongest harness available and
         at least one adversarial or failure-path case.
      4. Append concrete findings to `.eval-sandbox/review/findings.md`.
      5. Emit exactly one `analysis.complete` event with a concise evidence summary.
      6. Stop immediately after emitting `analysis.complete`.

      ### DON'T
      - ❌ Modify code
      - ❌ Flag things that are fine
      - ❌ Miss security issues
      - ❌ Emit anything except `analysis.complete`

# ─────────────────────────────────────────────────────────────────────────────
# Review Categories Reference
# ─────────────────────────────────────────────────────────────────────────────
#
# Critical (Blocks Merge):
#   - Bugs that will cause failures
#   - Security vulnerabilities
#   - Data loss risks
#   - Breaking API changes without version bump
#
# Suggestions (Should Address):
#   - Missing error handling
#   - Unclear logic
#   - Missing tests for new code
#   - Performance issues
#
# Nitpicks (Optional):
#   - Naming improvements
#   - Minor refactoring opportunities
#   - Documentation additions
# ─────────────────────────────────────────────────────────────────────────────
